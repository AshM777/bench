services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: bench
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://bench:bench@db:5432/bench
      PORT: "3100"
      SERVE_UI: "true"
      BENCH_DEPLOYMENT_MODE: "authenticated"
      BENCH_DEPLOYMENT_EXPOSURE: "private"
      BENCH_PUBLIC_URL: "${BENCH_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - bench-data:/bench
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  bench-data:
